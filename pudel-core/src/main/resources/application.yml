spring:
  application:
    name: pudel-discord-bot
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pudel}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASS:}
    driver-class-name: org.postgresql.Driver

server:
  port: 8080
  servlet:
    context-path: /

# ===========================================
# SpringDoc OpenAPI / Swagger UI
# ===========================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    filter: true
  show-actuator: false
  default-produces-media-type: application/json

# ===========================================
# Main Config
# Without field subscription, chatbot, memory & ollama
# Default .yml fallback will be used
# ===========================================

pudel:
  branding:
    name: ${PUDEL_BRANDING_NAME:Pudel}
    codename: ${PUDEL_BRANDING_CODENAME:Canis Lupus Familiaris}
    version: ${PUDEL_BRANDING_VERSION:2.2.1}
  discord:
    token: ${DISCORD_BOT_TOKEN:}
    prefix: "!"
    shards: 1
    enable-voice: false
    oauth:
      clientId: ${DISCORD_CLIENT_ID:}
      clientSecret: ${DISCORD_CLIENT_SECRET:}
      redirectUri: ${DISCORD_REDIRECT_URI:http://localhost/auth/callback}
  database:
    schema-name: public
  plugin:
    directory: ${PUDEL_PLUGIN_DIRECTORY:plugins}
    enable-auto-discovery: ${PUDEL_PLUGIN_ENABLE_AUTO_DISCOVERY:true}
    enable-auto-load: ${PUDEL_PLUGIN_ENABLE_AUTO_LOAD:true}
    # Retry settings for failed plugins
    retry-interval-ms: ${PUDEL_PLUGIN_RETRY_INTERVAL:30000}
    max-retry-attempts: ${PUDEL_PLUGIN_MAX_RETRIES:3}
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/pv.key}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/pb.key}
    expiration: ${JWT_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}

  # ===========================================
  # Swagger / OpenAPI Access Protection
  # When true, Swagger UI requires admin crypto challenge auth
  # When false, Swagger UI is publicly accessible (dev mode)
  # ===========================================
  swagger:
    access-protected: ${SWAGGER_ACCESS_PROTECTED:true}

  # ===========================================
  # Ownership Configuration
  # Owner's RSA public key for mutual authentication (separate from JWT keys)
  # The owner keeps their private key secure and uses it to sign admin challenges
  # ===========================================
  admin:
    # Initial owner Discord user ID - only used when no admins exist in database
    initial-owner: ${PUDEL_ADMIN_INITIAL_OWNER:}
    owner-public-key-path: ${PUDEL_ADMIN_OWNER_PUBLIC_KEY_PATH:keys/owner_pb.key}

  # ===========================================
  # Subscription Tiers Configuration
  # Hosters can customize these values for their SaaS model
  # ===========================================
  subscription:
    tiers:
      FREE:
        name: "Free"
        description: "Basic free tier with limited capacity"
        user:
          dialogueLimit: 1000
          memoryLimit: 100
        guild:
          dialogueLimit: 5000
          memoryLimit: 500
        features:
          chatbot: true
          customPersonality: true
          pluginLimit: -1
          voiceEnabled: false
          prioritySupport: false
      TIER_1:
        name: "Tier 1"
        description: "Basic paid subscription with increased limits"
        user:
          dialogueLimit: 1500
          memoryLimit: 150
        guild:
          dialogueLimit: 7500
          memoryLimit: 750
        features:
          chatbot: true
          customPersonality: true
          pluginLimit: -1
          voiceEnabled: true
          prioritySupport: false
      TIER_2:
        name: "Tier 2"
        description: "Premium subscription with higher limits"
        user:
          dialogueLimit: 2000
          memoryLimit: 200
        guild:
          dialogueLimit: 10000
          memoryLimit: 1000
        features:
          chatbot: true
          customPersonality: true
          pluginLimit: -1
          voiceEnabled: true
          prioritySupport: true
      UNLIMITED:
        name: "Unlimited"
        description: "Unlimited tier for special cases"
        user:
          dialogueLimit: -1
          memoryLimit: -1
        guild:
          dialogueLimit: -1
          memoryLimit: -1
        features:
          chatbot: true
          customPersonality: true
          pluginLimit: -1
          voiceEnabled: true
          prioritySupport: true
    defaultTier: FREE
    enableExpiration: true

  # ===========================================
  # Chatbot Configuration
  # ===========================================
  chatbot:
    triggers:
      onMention: true
      onDirectMessage: true
      onReplyToBot: true
      keywords:
        - "pudel"
        - "hey pudel"
        - "hi pudel"
      alwaysActiveChannels: []
    contextSize: 10
    passiveTracking:
      enabled: true
      minMessageLength: 20
      trackUrlMentions: true
      trackDatesMentions: true
      # Queue management to prevent overload
      maxQueueSize: 100
      maxMessageAgeMs: 60000
      processingIntervalMs: 500
      batchSize: 3
      llmTimeoutSeconds: 30
    embedding:
      enabled: true
      dimension: 384
      ivfProbes: 10
      ivfLists: 100

  # ===========================================
  # Memory Management Configuration
  # ===========================================
  memory:
    autoCleanup:
      enabled: true
      keepPercentage: 80
      minAgeDays: 30
    semanticSearch:
      enabled: true
      minSimilarity: 0.7
      maxResults: 10

  # ===========================================
  # Ollama LLM Configuration
  # Local LLM for intelligent chatbot responses
  # ===========================================
  # FOR CLOUD MODELS (gemini, etc.): Set OLLAMA_TOKEN env var
  # or run 'ollama signin' / 'docker exec -it pudel-ollama ollama signin'
  # ===========================================
  ollama:
    enabled: ${OLLAMA_ENABLED:true}
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:qwen3:8b}
    temperature: 0.7
    # For thinking models (qwen3, deepseek), use higher max-tokens (512-1024)
    # because thinking consumes tokens before the actual response
    max-tokens: 2048
    timeout-seconds: 180
    keep-alive: true
    keep-alive-duration: 5m
    context-window: 8192
    retry-count: 2
    streaming: true
    # For thinking models, add /no_think to disable thinking mode for faster responses
    # You can also use this as suffix in messages
    disable-thinking: false
    system-prompt-prefix: |
      You are Pudel, a helpful and friendly Discord assistant bot.
      You are designed to be a personal maid/secretary for Discord servers.
      Be concise, helpful, and maintain the personality traits given to you.
      Respond naturally like a real assistant would.
      Keep responses short (1-3 sentences) unless asked for more detail.

    # ===========================================
    # Ollama Embedding Configuration
    # Uses Ollama's embedding API for semantic search
    # ===========================================
    embedding-enabled: ${EMBEDDING_ENABLED:true}
    embedding-model: ${EMBEDDING_MODEL:qwen3-embedding:8b}
    # Preprocess Discord syntax (mentions, emojis, etc.) before embedding
    embedding-preprocess-discord: true

# ===========================================
# Logger \m/
# Define your annoying about log
# ===========================================

logging:
  level:
    root: INFO
    worldstandard.group: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"