name: Publish Pudel API

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  publish-api:
    name: Build & Publish API
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Extract Version from Tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build API Module
        run: |
          mvn clean package -pl pudel-api -am -DskipTests -B

      - name: Upload API JAR as Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pudel-api-jar
          path: pudel-api/target/pudel-api-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: Pudel API v${{ steps.version.outputs.version }}
          body: |
            ## Pudel Plugin Development Kit (PDK) v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Maven:**
            ```xml
            <dependency>
                <groupId>group.worldstandard</groupId>
                <artifactId>pudel-api</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
                <scope>provided</scope>
            </dependency>
            ```
            
            **Gradle:**
            ```groovy
            compileOnly 'group.worldstandard:pudel-api:${{ steps.version.outputs.version }}'
            ```
            
            ### Documentation
            - [Javadoc](https://world-standard-group.github.io/Pudel-Spring-Boot/)
            - [Plugin Development Guide](https://github.com/World-Standard-Group/Pudel-Spring-Boot/blob/main/pudel-api/README.md)
          files: |
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}.jar
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}-sources.jar
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}-javadoc.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-packages:
    name: Publish to GitHub Packages
    needs: publish-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Publish to GitHub Packages
        run: |
          mvn deploy -pl pudel-api -am -DskipTests -B \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/World-Standard-Group/Pudel-Spring-Boot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Docker Image CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          tags: |
            zazalng/pudel:${{ github.ref_name }}
            zazalng/pudel:latest

  deploy-docs:
    name: Deploy Javadocs
    needs: publish-api
    runs-on: ubuntu-latest

    concurrency:
      group: "pages"
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build API Module
        run: mvn clean install -pl pudel-api -am -DskipTests -B

      - name: Generate API Javadocs
        run: mvn javadoc:javadoc -pl pudel-api -Ddoclint=none -B

      - name: Verify Javadoc Output
        run: |
          if [ ! -f ./pudel-api/target/site/apidocs/index.html ]; then
            echo "::error::Javadoc index.html not found at expected path"
            echo "Searching for generated HTML files:"
            find ./pudel-api/target/ -name "index.html" 2>/dev/null || echo "No index.html found anywhere in target/"
            find ./pudel-api/target/ -type d -name "apidocs" 2>/dev/null || echo "No apidocs directory found"
            exit 1
          fi
          echo "✅ Javadoc generated successfully at pudel-api/target/site/apidocs/"
          ls -la ./pudel-api/target/site/apidocs/

      - name: Fix Jekyll processing
        run: touch ./pudel-api/target/site/apidocs/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          name: github-pages
          path: ./pudel-api/target/site/apidocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
