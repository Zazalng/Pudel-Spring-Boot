name: Publish Pudel API

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  publish-api:
    name: Build & Publish API
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Version from Tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build API Module
        run: |
          mvn clean package -pl pudel-api -am -DskipTests -B

      - name: Upload API JAR as Artifact
        uses: actions/upload-artifact@v6
        with:
          name: pudel-api-jar
          path: pudel-api/target/pudel-api-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pudel API v${{ steps.version.outputs.version }}
          body: |
            ## Pudel Plugin Development Kit (PDK) v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Maven:**
            ```xml
            <dependency>
                <groupId>group.worldstandard</groupId>
                <artifactId>pudel-api</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
                <scope>provided</scope>
            </dependency>
            ```
            
            **Gradle:**
            ```groovy
            compileOnly 'group.worldstandard:pudel-api:${{ steps.version.outputs.version }}'
            ```
            
            ### Documentation
            - [Javadoc](https://world-standard-group.github.io/Pudel-Spring-Boot/)
            - [Plugin Development Guide](https://github.com/World-Standard-Group/Pudel-Spring-Boot/blob/main/pudel-api/README.md)
          files: |
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}.jar
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}-sources.jar
            pudel-api/target/pudel-api-${{ steps.version.outputs.version }}-javadoc.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-packages:
    name: Publish to GitHub Packages
    needs: publish-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Publish to GitHub Packages
        run: |
          mvn deploy -pl pudel-api -am -DskipTests -B \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/World-Standard-Group/Pudel-Spring-Boot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Javadocs
    needs: publish-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Parent Locally
        run: mvn install -N -DskipTests -B

      - name: Generate API Javadocs
        run: mvn javadoc:javadoc -pl pudel-api -Ddoclint=none -B

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pudel-api/target/site/apidocs
          commit_message: "docs: deploy api javadocs for ${{ github.ref_name }}"