# ===========================================
# Pudel Discord Bot - Docker Compose
# Complete setup with PostgreSQL, Ollama, and the Bot
# ===========================================

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg18
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: pudel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-pudelpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pudel}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pudel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pudel-network

  # ===========================================
  # Ollama LLM Service (Optional - for AI features)
  # Only starts when OLLAMA_ENABLED=true or using 'ollama' profile
  # Usage: docker-compose --profile ollama up -d
  # Or set OLLAMA_ENABLED=true in .env
  # ===========================================
  #
  # FOR CLOUD MODELS (gemini, etc.):
  # 1. Run once: docker exec -it pudel-ollama ollama login
  # 2. This saves auth to the ollama_data volume persistently
  # OR set OLLAMA_TOKEN env var (see below)
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: pudel-ollama
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Authentication token for cloud/remote models (e.g., gemini-3-pro-preview)
      # Option 1: Run 'docker exec -it pudel-ollama ollama login' once (recommended)
      # Option 2: Set OLLAMA_TOKEN from https://ollama.com/settings/keys
      - OLLAMA_TOKEN=${OLLAMA_TOKEN:-}
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pudel-network

  # ===========================================
  # Pudel Discord Bot
  # ===========================================
  pudel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REPO: ${GIT_REPO:-https://github.com/World-Standard-Group/Pudel-Spring-Boot.git}
        GIT_BRANCH: ${GIT_BRANCH:-main}
    image: pudel-bot:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: pudel-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # Note: Ollama dependency is removed - Pudel handles connection gracefully
      # If you need strict dependency, use: docker-compose --profile ollama up -d
    environment:
      # Server
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_ACCESS_PROTECTED: ${SWAGGER_ACCESS_PROTECTED:-true}
      AUTO_UPDATE: ${AUTO_UPDATE:-true}
      GIT_REPO: ${GIT_REPO:-https://github.com/World-Standard-Group/Pudel-Spring-Boot.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}

      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASS: ${POSTGRES_PASS:-pudelpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pudel}

      # Discord Bot
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost/auth/callback}

      # Security (RSA keys mounted via volume)
      # The paths in .env are relative (e.g., keys/private.key)
      # Docker maps ./keys to /app/keys, so we extract just the filename
      JWT_PRIVATE_KEY_PATH: /app/keys/${JWT_PRIVATE_KEY_FILE:-pv.key}
      JWT_PUBLIC_KEY_PATH: /app/keys/${JWT_PUBLIC_KEY_FILE:-pb.key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}

      # Ollama
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}

      # Embedding
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:8b}

      # Server
      SERVER_PORT: ${SERVER_PORT:-8080}

      # JVM (do NOT wrap value in quotes in .env file - Docker handles quoting)
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx2g -XX:+UseG1GC -XX:+UseStringDeduplication}"

      # Branding Configuration
      PUDEL_BRANDING_NAME: ${PUDEL_BRANDING_NAME:-Pudel}
      PUDEL_BRANDING_CODENAME: ${PUDEL_BRANDING_CODENAME:-Canis Lupus Familiaris}
      PUDEL_BRANDING_VERSION: ${PUDEL_BRANDING_VERSION}

      # Plugin Configuration
      PUDEL_PLUGIN_DIRECTORY: /app/plugins
      PUDEL_PLUGIN_ENABLE_AUTO_DISCOVERY: ${PLUGIN_AUTO_DISCOVERY:-true}
      PUDEL_PLUGIN_ENABLE_AUTO_LOAD: ${PLUGIN_AUTO_LOAD:-true}

      # Admin Configuration
      # Set your Discord user ID here to become the initial OWNER
      PUDEL_ADMIN_INITIAL_OWNER: ${PUDEL_ADMIN_INITIAL_OWNER:-}
      # Owner's RSA public key for mutual authentication (separate from JWT keys)
      PUDEL_ADMIN_OWNER_PUBLIC_KEY_PATH: /app/keys/${PUDEL_ADMIN_OWNER_PUBLIC_KEY_FILE:-owner_pb.key}
    volumes:
      # Bind mount for plugins - allows live plugin updates from host
      # On host: ./plugins directory, In container: /app/plugins
      # You can drop new .jar files into ./plugins and they will be auto-detected
      # IMPORTANT: Run 'chmod 777 ./plugins' on host or ensure UID 1000 has write access
      - ./plugins:/app/plugins:rw
      # RSA keys for JWT - read-only mount
      # Keys: keys/pv.key (private) and keys/pb.key (public)
      - ./keys:/app/keys:ro
      - pudel_logs:/app/logs
      - pudel_src:/app/src
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    networks:
      - pudel-network

  # ===========================================
  # Pudel Updater Service (Trigger update from Git)
  #
  # HOW IT WORKS:
  #   1. Pulls latest code from GIT_REPO/GIT_BRANCH into the shared
  #      pudel_src volume (same volume mounted in the pudel container)
  #   2. After pull, it restarts the pudel container via Docker socket
  #   3. On restart, pudel's entrypoint detects AUTO_UPDATE=true,
  #      rebuilds from the updated source, and starts the new JAR
  #
  # USAGE:
  #   Manual:   docker compose run --rm pudel-updater
  #   Cron:     0 */6 * * * cd /path/to/project && docker compose run --rm pudel-updater
  #   Webhook:  Call from a GitHub webhook handler
  #
  # ===========================================
  pudel-updater:
    image: docker:cli
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: pudel-updater
    restart: "no"
    volumes:
      - pudel_src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GIT_REPO: ${GIT_REPO:-https://github.com/World-Standard-Group/Pudel-Spring-Boot.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
    entrypoint: /bin/sh
    command: >
      -c "
        apk add --no-cache git > /dev/null 2>&1 &&
        cd /app/src &&
        git config --global --add safe.directory /app/src &&

        if [ -d .git ]; then
          echo '[1/3] Fetching latest from $${GIT_BRANCH}...' &&
          git fetch origin $${GIT_BRANCH} &&
          LOCAL=$$(git rev-parse HEAD) &&
          REMOTE=$$(git rev-parse origin/$${GIT_BRANCH}) &&
          if [ \"$$LOCAL\" = \"$$REMOTE\" ]; then
            echo 'Already up to date. No restart needed.' &&
            exit 0;
          fi &&
          echo '[2/3] New commits found, pulling...' &&
          git reset --hard origin/$${GIT_BRANCH};
        else
          echo '[1/3] Cloning repository...' &&
          git clone --depth 1 --branch $${GIT_BRANCH} $${GIT_REPO} . &&
          echo '[2/3] Clone complete.';
        fi &&

        echo '[3/3] Restarting pudel container to apply update...' &&
        docker restart pudel-bot &&
        echo 'Update triggered! The bot will rebuild and restart.'
      "
    profiles:
      - update
    networks:
      - pudel-network

# ===========================================
# Networks
# ===========================================
networks:
  pudel-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  pudel_logs:
    driver: local
  pudel_src:
    driver: local